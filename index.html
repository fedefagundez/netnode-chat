<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetNode Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <h1>NetNode Chat</h1>
      <p>Ingresa tu nombre para unirte a la red</p>
      <input type="text" id="name-input" placeholder="Tu nombre" maxlength="20" autofocus>
      <button id="btn-join">Unirse</button>
    </div>
  </div>

  <div id="app" class="app hidden">
    <div class="topbar">
      <span class="app-title">NetNode Chat</span>
      <span class="node-info">Soy: <strong id="my-name"></strong> (<span id="my-label"></span>)</span>
      <span class="nbadge" id="badge">0 nodos</span>
    </div>

    <div class="main">
      <div class="chat-panel">
        <div class="contacts-header">Contactos</div>
        <div id="contacts-list" class="contacts-list"></div>

        <div class="chat-header">
          <span id="chat-with">Seleccioná un contacto</span>
          <div class="chat-header-right">
            <span id="my-status" class="my-status">Nodo activo</span>
            <button id="btn-toggle-node" class="toggle-btn on">🟢 On</button>
          </div>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="msg-input" placeholder="Escribí un mensaje..." disabled>
          <button id="btn-send" disabled>Enviar</button>
        </div>
      </div>

      <div class="network-panel">
        <div class="canvas-outer" id="canvas-outer">
          <canvas id="c"></canvas>
        </div>
        <div class="statusbar" id="status">Esperando conexión...</div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="sounds.js"></script>
  <script type="module" src="js/entry.js"></script>
</body>
</html>
